name: sms_gateway
description: SMS Gateway - Android SMS & Call Gateway controlled from web dashboard
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  web_socket_channel: ^3.0.1
  socket_io_client: ^3.0.2
  shared_preferences: ^2.3.4
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  http: ^1.2.2
  connectivity_plus: ^6.1.1
  battery_plus: ^6.0.3
  google_fonts: ^6.2.1
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.1.0
  dio: ^5.7.0
  uuid: ^4.5.1
  mobile_scanner: ^6.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
